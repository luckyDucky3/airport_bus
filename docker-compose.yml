services:
  bus:
    build:
      context: .
      dockerfile: BusApi/Dockerfile
    container_name: bus
    restart: unless-stopped
    ports:
      - "8011:8000"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8000
      ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=airport_bus;Username=postgres;Password=postgres
      Kafka__Enabled: "true"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16
    container_name: bus_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: airport_bus
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d airport_bus"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
